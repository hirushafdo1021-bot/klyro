async function storeGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch {
    return fallback;
  }
}
async function storeSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error("storage error", e);
  }
}

// Downscale + compress an uploaded image to a base64 JPEG (keeps storage small)
function compressImage(file, max = 900, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read failed"));
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > h && w > max) { h = Math.round((h * max) / w); w = max; }
        else if (h >= w && h > max) { w = Math.round((w * max) / h); h = max; }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("decode failed"));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================ App ============================ */
function App() {
  const [ready, setReady] = useState(false);
  const [products, setProducts] = useState([]);
  const [orders, setOrders] = useState([]);

  const [view, setView] = useState("shop"); // shop | product | checkout | confirm | admin-login | admin
  const [activeProduct, setActiveProduct] = useState(null);
  const [filter, setFilter] = useState("All");

  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [lastOrder, setLastOrder] = useState(null);

  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminTab, setAdminTab] = useState("dashboard");

  /* ---- load ---- */
  useEffect(() => {
    (async () => {
      let p = await storeGet("klyro_products", null);
      if (!p) { p = SEED; await storeSet("klyro_products", p); }
      const o = await storeGet("klyro_orders", []);
      setProducts(p); setOrders(o); setReady(true);
    })();
  }, []);

  const persistProducts = async (p) => { setProducts(p); await storeSet("klyro_products", p); };
  const persistOrders = async (o) => { setOrders(o); await storeSet("klyro_orders", o); };

  const go = (v) => { setView(v); setMenuOpen(false); window.scrollTo(0, 0); };

  const categories = useMemo(
    () => ["All", ...Array.from(new Set(products.map((p) => p.category).filter(Boolean)))],
    [products]
  );
  const shown = useMemo(
    () => (filter === "All" ? products : products.filter((p) => p.category === filter)),
    [products, filter]
  );
  const cartCount = cart.reduce((n, i) => n + i.qty, 0);
  const cartTotal = cart.reduce((n, i) => n + i.qty * i.price, 0);

  /* ---- cart ops ---- */
  function variantStock(productId, colorName, size) {
    const p = products.find((x) => x.id === productId);
    const c = p?.colors.find((x) => x.name === colorName);
    return c?.sizes.find((x) => x.size === size)?.qty ?? 0;
  }
  function inCartQty(key) {
    return cart.find((i) => i.key === key)?.qty ?? 0;
  }
  function addToCart(product, colorIdx, size, qty) {
    const color = product.colors[colorIdx];
    const key = `${product.id}|${color.name}|${size}`;
    const avail = variantStock(product.id, color.name, size) - inCartQty(key);
    if (avail <= 0) return false;
    const add = Math.min(qty, avail);
    setCart((prev) => {
      const ex = prev.find((i) => i.key === key);
      if (ex) return prev.map((i) => (i.key === key ? { ...i, qty: i.qty + add } : i));
      return [...prev, {
        key, productId: product.id, productName: product.name,
        colorName: color.name, hex: color.hex, image: color.image,
        size, price: product.price, cost: product.cost, qty: add,
      }];
    });
    return true;
  }
  function setCartQty(key, qty) {
    const item = cart.find((i) => i.key === key);
    if (!item) return;
    const max = variantStock(item.productId, item.colorName, item.size);
    const q = Math.max(0, Math.min(qty, max));
    setCart((prev) => q === 0 ? prev.filter((i) => i.key !== key) : prev.map((i) => i.key === key ? { ...i, qty: q } : i));
  }
  const removeItem = (key) => setCart((prev) => prev.filter((i) => i.key !== key));

  /* ---- checkout ---- */
  async function placeOrder(customer, payment) {
    const next = products.map((p) => ({ ...p, colors: p.colors.map((c) => ({ ...c, sizes: c.sizes.map((s) => ({ ...s })) })) }));
    cart.forEach((item) => {
      const p = next.find((x) => x.id === item.productId);
      const c = p?.colors.find((x) => x.name === item.colorName);
      const s = c?.sizes.find((x) => x.size === item.size);
      if (s) s.qty = Math.max(0, s.qty - item.qty);
    });
    const order = {
      id: "KLY-" + Date.now().toString().slice(-6),
      date: new Date().toISOString(),
      items: cart.map((i) => ({ ...i })),
      customer, payment, total: cartTotal,
    };
    await persistProducts(next);
    await persistOrders([order, ...orders]);
    setLastOrder(order);
    setCart([]);
    go("confirm");
  }

  if (!ready) {
    return (
      <div className="k-root k-splash">
        <style>{CSS}</style>
        <img src={LOGO} alt="Klyro" className="k-splash-mark" />
      </div>
    );
  }

  return (
    <div className="k-root">
      <style>{CSS}</style>

      {/* ---------------- Header ---------------- */}
      <header className="k-header">
        <div className="k-header-inner">
          <button className="k-icon k-only-mobile" aria-label="Menu" onClick={() => setMenuOpen((v) => !v)}>
            <Ico name="menu" size={20} />
          </button>

          <nav className="k-nav k-only-desk">
            <button className={`k-navlink ${view === "shop" ? "is-on" : ""}`} onClick={() => { setFilter("All"); go("shop"); }}>Shop</button>
            <button className="k-navlink" onClick={() => { setAdminAuthed(false); go("admin-login"); }}>Atelier</button>
          </nav>

          <button className="k-logo" onClick={() => go("shop")} aria-label="Klyro home">
            <span className="k-logo-word">Klyro</span>
            <Ico name="heart" size={13} className="k-logo-heart" fill="currentColor" />
          </button>

          <div className="k-header-right">
            <button className="k-icon" aria-label="Atelier" onClick={() => { setAdminAuthed(false); go("admin-login"); }}>
              <Ico name="lock" size={17} />
            </button>
            <button className="k-icon k-cartbtn" aria-label="Bag" onClick={() => setCartOpen(true)}>
              <Ico name="bag" size={19} />
              {cartCount > 0 && <span className="k-badge">{cartCount}</span>}
            </button>
          </div>
        </div>

        {menuOpen && (
          <div className="k-mobile-menu">
            <button onClick={() => { setFilter("All"); go("shop"); }}>Shop</button>
            <button onClick={() => { setAdminAuthed(false); go("admin-login"); }}>Atelier</button>
          </div>
        )}
      </header>

      {/* ---------------- Views ---------------- */}
      <main className="k-main">
        {view === "shop" && (
          <ShopView
            products={shown} categories={categories} filter={filter} setFilter={setFilter}
            onOpen={(p) => { setActiveProduct(p); go("product"); }}
          />
        )}

        {view === "product" && activeProduct && (
          <ProductView
            product={products.find((p) => p.id === activeProduct.id) || activeProduct}
            variantStock={variantStock} inCartQty={inCartQty}
            onBack={() => go("shop")}
            onAdd={(c, s, q) => { if (addToCart(products.find((p) => p.id === activeProduct.id), c, s, q)) setCartOpen(true); }}
          />
        )}

        {view === "checkout" && (
          <CheckoutView
            cart={cart} total={cartTotal}
            onBack={() => go("shop")}
            onPlace={placeOrder}
            setQty={setCartQty} removeItem={removeItem}
          />
        )}

        {view === "confirm" && lastOrder && (
          <ConfirmView order={lastOrder} onShop={() => go("shop")} />
        )}

        {view === "admin-login" && (
          <AdminLogin onAuth={() => { setAdminAuthed(true); setAdminTab("dashboard"); go("admin"); }} onBack={() => go("shop")} />
        )}

        {view === "admin" && adminAuthed && (
          <AdminView
            tab={adminTab} setTab={setAdminTab}
            products={products} orders={orders}
            persistProducts={persistProducts}
            onExit={() => { setAdminAuthed(false); go("shop"); }}
          />
        )}
      </main>

      {/* ---------------- Footer ---------------- */}
      {view !== "admin" && (
        <footer className="k-footer">
          <img src={LOGO} alt="Klyro" className="k-foot-seal" />
          <p className="k-foot-tag">Quietly luxurious dresses, made to be lived in.</p>
          <div className="k-foot-links">
            <button onClick={() => { setFilter("All"); go("shop"); }}>Collection</button>
            <span>·</span>
            <button onClick={() => { setAdminAuthed(false); go("admin-login"); }}>Atelier login</button>
          </div>
          <p className="k-foot-fine">© {new Date().getFullYear()} Klyro. Demo storefront.</p>
        </footer>
      )}

      {/* ---------------- Cart drawer ---------------- */}
      <CartDrawer
        open={cartOpen} onClose={() => setCartOpen(false)}
        cart={cart} total={cartTotal} setQty={setCartQty} removeItem={removeItem}
        onCheckout={() => { setCartOpen(false); go("checkout"); }}
        onShop={() => { setCartOpen(false); setFilter("All"); go("shop"); }}
      />
    </div>
  );
}

/* ============================ Product detail ============================ */
function ProductView({ product, variantStock, inCartQty, onBack, onAdd }) {
  const [ci, setCi] = useState(0);
  const [size, setSize] = useState(null);
  const [qty, setQty] = useState(1);
  const color = product.colors[ci];

  useEffect(() => { setSize(null); setQty(1); }, [ci]);

  const sizeStock = (s) => variantStock(product.id, color.name, s);
  const key = size ? `${product.id}|${color.name}|${size}` : null;
  const remaining = size ? sizeStock(size) - inCartQty(key) : 0;
  const canAdd = size && remaining > 0;

  return (
    <div className="k-fade k-pdp">
      <button className="k-back" onClick={onBack}><Ico name="arrowLeft" size={15} /> Collection</button>
      <div className="k-pdp-grid">
        <div className="k-pdp-media">
          <div className="k-pdp-main"><Img src={color.image} hex={color.hex} alt={`${product.name} — ${color.name}`} /></div>
          <div className="k-pdp-thumbs">
            {product.colors.map((c, i) => (
              <button key={c.name} className={`k-thumb ${i === ci ? "is-on" : ""}`} onClick={() => setCi(i)} aria-label={c.name}>
                <Img src={c.image} hex={c.hex} alt={c.name} />
              </button>
            ))}
          </div>
        </div>

        <div className="k-pdp-info">
          <span className="k-card-cat">{product.category}</span>
          <h1 className="k-pdp-name">{product.name}</h1>
          <p className="k-pdp-price">{money(product.price)}</p>
          <p className="k-pdp-desc">{product.description}</p>

          <div className="k-field">
            <label className="k-label">Colour — <strong>{color.name}</strong></label>
            <div className="k-swatches">
              {product.colors.map((c, i) => (
                <button key={c.name} className={`k-swatch ${i === ci ? "is-on" : ""}`} onClick={() => setCi(i)} title={c.name}>
                  <i style={{ background: c.hex }} />
                </button>
              ))}
            </div>
          </div>

          <div className="k-field">
            <label className="k-label">Size</label>
            <div className="k-sizes">
              {color.sizes.map((s) => {
                const out = s.qty <= 0;
                return (
                  <button key={s.size} disabled={out}
                    className={`k-size ${size === s.size ? "is-on" : ""} ${out ? "is-out" : ""}`}
                    onClick={() => setSize(s.size)}>
                    {s.size}
                  </button>
                );
              })}
            </div>
            {size && remaining > 0 && remaining <= LOW_STOCK && (
              <p className="k-lowstock"><Ico name="alert" size={13} /> Only {remaining} left in {color.name}</p>
            )}
            {size && remaining <= 0 && <p className="k-lowstock">That size is in your bag or sold out.</p>}
          </div>

          <div className="k-buyrow">
            <div className="k-stepper">
              <button onClick={() => setQty((q) => Math.max(1, q - 1))} aria-label="Less"><Ico name="minus" size={15} /></button>
              <span>{qty}</span>
              <button onClick={() => setQty((q) => Math.min(remaining || 1, q + 1))} aria-label="More"><Ico name="plus" size={15} /></button>
            </div>
            <button className="k-btn k-btn-gold k-grow" disabled={!canAdd} onClick={() => onAdd(ci, size, qty)}>
              {size ? "Add to bag" : "Select a size"} {canAdd && <Ico name="arrowRight" size={16} />}
            </button>
          </div>

          <div className="k-spec">
            <Eyebrow>Fabric &amp; care</Eyebrow>
            <p>{product.fabric}</p>
          </div>
        </div>
      </div>
    </div>
  );

/* ============================ Checkout ============================ */
function CheckoutView({ cart, total, onBack, onPlace, setQty, removeItem }) {
  const [c, setC] = useState({ name: "", phone: "", a1: "", a2: "", a3: "" });
  const [card, setCard] = useState({ number: "", name: "", exp: "", cvc: "" });
  const [errors, setErrors] = useState({});
  const [placing, setPlacing] = useState(false);

  const shipping = total > 0 ? 850 : 0;
  const grand = total + shipping;

  function validate() {
    const e = {};
    if (!c.name.trim()) e.name = "Add the name for delivery.";
    if (!/^[0-9 +()-]{7,}$/.test(c.phone.trim())) e.phone = "Add a reachable phone number.";
    if (!c.a1.trim()) e.a1 = "Address line 1 is required.";
    const digits = card.number.replace(/\s/g, "");
    if (digits.length < 12) e.cardNumber = "Enter a valid card number.";
    if (!card.name.trim()) e.cardName = "Name on card is required.";
    if (!/^\d{2}\/\d{2}$/.test(card.exp)) e.exp = "MM/YY";
    if (!/^\d{3,4}$/.test(card.cvc)) e.cvc = "CVC";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  async function submit() {
    if (cart.length === 0) return;
    if (!validate()) { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    setPlacing(true);
    const last4 = card.number.replace(/\s/g, "").slice(-4);
    await onPlace(
      { name: c.name.trim(), phone: c.phone.trim(), address: [c.a1, c.a2, c.a3].filter(Boolean) },
      { method: "Card", last4 }
    );
  }

  const fmtCard = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
  const fmtExp = (v) => { const d = v.replace(/\D/g, "").slice(0, 4); return d.length > 2 ? d.slice(0, 2) + "/" + d.slice(2) : d; };

  if (cart.length === 0) {
    return (
      <div className="k-fade k-checkout-empty">
        <h1 className="k-pdp-name">Your bag is empty</h1>
        <button className="k-btn k-btn-gold" onClick={onBack}>Back to the collection</button>
      </div>
    );
  }

  return (
    <div className="k-fade k-checkout">
      <button className="k-back" onClick={onBack}><Ico name="arrowLeft" size={15} /> Continue shopping</button>
      <h1 className="k-page-title">Checkout</h1>

      <div className="k-checkout-grid">
        <div className="k-checkout-forms">
          <section className="k-panel">
            <Eyebrow>01 — Delivery details</Eyebrow>
            <Input label="Full name" value={c.name} err={errors.name} onChange={(v) => setC({ ...c, name: v })} placeholder="Recipient's name" />
            <Input label="Phone number" value={c.phone} err={errors.phone} onChange={(v) => setC({ ...c, phone: v })} placeholder="+94 ..." />
            <Input label="Address line 1" value={c.a1} err={errors.a1} onChange={(v) => setC({ ...c, a1: v })} placeholder="House / street" />
            <Input label="Address line 2" value={c.a2} onChange={(v) => setC({ ...c, a2: v })} placeholder="Area / suburb (optional)" />
            <Input label="Address line 3" value={c.a3} onChange={(v) => setC({ ...c, a3: v })} placeholder="City / postal code (optional)" />
          </section>

          <section className="k-panel">
            <Eyebrow>02 — Payment</Eyebrow>
            <p className="k-demo-note"><Ico name="lock" size={12} /> Demo checkout — no real card is charged. Connect a payment provider (e.g. Stripe) to go live.</p>
            <Input label="Card number" value={card.number} err={errors.cardNumber} onChange={(v) => setCard({ ...card, number: fmtCard(v) })} placeholder="0000 0000 0000 0000" inputMode="numeric" />
            <Input label="Name on card" value={card.name} err={errors.cardName} onChange={(v) => setCard({ ...card, name: v })} placeholder="As printed" />
            <div className="k-row2">
              <Input label="Expiry" value={card.exp} err={errors.exp} onChange={(v) => setCard({ ...card, exp: fmtExp(v) })} placeholder="MM/YY" inputMode="numeric" />
              <Input label="CVC" value={card.cvc} err={errors.cvc} onChange={(v) => setCard({ ...card, cvc: v.replace(/\D/g, "").slice(0, 4) })} placeholder="123" inputMode="numeric" />
            </div>
          </section>
        </div>

        <aside className="k-summary">
          <h3>Order summary</h3>
          <div className="k-sum-items">
            {cart.map((i) => (
              <div key={i.key} className="k-sum-line">
                <div className="k-sum-img"><Img src={i.image} hex={i.hex} alt={i.productName} /><span className="k-sum-qty">{i.qty}</span></div>
                <div className="k-sum-info">
                  <p className="k-sum-name">{i.productName}</p>
                  <p className="k-sum-meta">{i.colorName} · {i.size}</p>

/* ============================ Admin ============================ */
function AdminView({ tab, setTab, products, orders, persistProducts, onExit }) {
  const stats = useMemo(() => {
    let revenue = 0, cost = 0, units = 0;
    orders.forEach((o) => o.items.forEach((i) => { revenue += i.price * i.qty; cost += (i.cost || 0) * i.qty; units += i.qty; }));
    const stockUnits = products.reduce((n, p) => n + p.colors.reduce((m, c) => m + c.sizes.reduce((k, s) => k + s.qty, 0), 0), 0);
    const stockValue = products.reduce((n, p) => n + p.colors.reduce((m, c) => m + c.sizes.reduce((k, s) => k + s.qty * p.price, 0), 0), 0);
    let low = 0;
    products.forEach((p) => p.colors.forEach((c) => c.sizes.forEach((s) => { if (s.qty > 0 && s.qty <= LOW_STOCK) low++; })));
    return { revenue, cost, profit: revenue - cost, units, stockUnits, stockValue, low, orderCount: orders.length };
  }, [products, orders]);

  const soldByProduct = useMemo(() => {
    const m = {};
    orders.forEach((o) => o.items.forEach((i) => {
      m[i.productId] = m[i.productId] || { units: 0, profit: 0 };
      m[i.productId].units += i.qty;
      m[i.productId].profit += (i.price - (i.cost || 0)) * i.qty;
    }));
    return m;
  }, [orders]);

  return (
    <div className="k-admin">
      <aside className="k-admin-side">
        <div className="k-admin-brand"><span className="k-logo-word">Klyro</span><small>Atelier</small></div>
        <nav>
          <button className={tab === "dashboard" ? "is-on" : ""} onClick={() => setTab("dashboard")}><Ico name="dashboard" size={17} /> Dashboard</button>
          <button className={tab === "products" ? "is-on" : ""} onClick={() => setTab("products")}><Ico name="box" size={17} /> Products &amp; stock</button>
          <button className={tab === "add" ? "is-on" : ""} onClick={() => setTab("add")}><Ico name="box" size={17} /> Add product</button>
          <button className={tab === "orders" ? "is-on" : ""} onClick={() => setTab("orders")}><Ico name="receipt" size={17} /> Orders</button>
        </nav>
        <button className="k-admin-exit" onClick={onExit}>← Back to store</button>
      </aside>

      <div className="k-admin-main">
        {tab === "dashboard" && <AdminDashboard stats={stats} products={products} soldByProduct={soldByProduct} />}
        {tab === "products" && <AdminProducts products={products} soldByProduct={soldByProduct} persistProducts={persistProducts} />}
        {tab === "add" && <AdminAdd products={products} persistProducts={persistProducts} onDone={() => setTab("products")} />}
        {tab === "orders" && <AdminOrders orders={orders} />}
      </div>
    </div>
  );
}

function Kpi({ icon, label, value, accent }) {
  return (
    <div className={`k-kpi ${accent ? "k-kpi-accent" : ""}`}>
      <div className="k-kpi-ico">{icon}</div>
      <div><p className="k-kpi-label">{label}</p><p className="k-kpi-value">{value}</p></div>
    </div>
  );
}

function AdminDashboard({ stats, products, soldByProduct }) {
  const ranked = [...products].sort((a, b) => (soldByProduct[b.id]?.units || 0) - (soldByProduct[a.id]?.units || 0));
  return (
    <div className="k-fade">
      <h1 className="k-admin-title">Dashboard</h1>
      <div className="k-kpis">
        <Kpi icon={<Ico name="trendingUp" size={18} />} label="Revenue" value={money(stats.revenue)} accent />
        <Kpi icon={<Ico name="receipt" size={18} />} label="Profit" value={money(stats.profit)} accent />
        <Kpi icon={<Ico name="box" size={18} />} label="Units sold" value={stats.units} />
        <Kpi icon={<Ico name="box" size={18} />} label="Orders" value={stats.orderCount} />
        <Kpi icon={<Ico name="box" size={18} />} label="In-stock units" value={stats.stockUnits} />
        <Kpi icon={<Ico name="alert" size={18} />} label="Low-stock variants" value={stats.low} />
      </div>

      <div className="k-admin-card">
        <h3>Best sellers &amp; margin</h3>
        <table className="k-table">
          <thead><tr><th>Product</th><th>Sold</th><th>Cost</th><th>Price</th><th>Margin</th><th>Profit earned</th></tr></thead>
          <tbody>
            {ranked.map((p) => {
              const s = soldByProduct[p.id] || { units: 0, profit: 0 };
              const margin = Math.round(((p.price - p.cost) / p.price) * 100);
              return (
                <tr key={p.id}>
                  <td><strong>{p.name}</strong></td>
                  <td>{s.units}</td>
                  <td>{money(p.cost)}</td>
                  <td>{money(p.price)}</td>
                  <td><span className="k-pill">{margin}%</span></td>
                  <td className="k-pos">{money(s.profit)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AdminProducts({ products, soldByProduct, persistProducts }) {
  function adjust(pid, cName, sz, delta) {
    const next = products.map((p) => p.id !== pid ? p : {
      ...p, colors: p.colors.map((c) => c.name !== cName ? c : {
        ...c, sizes: c.sizes.map((s) => s.size !== sz ? s : { ...s, qty: Math.max(0, s.qty + delta) }),
      }),
    });
    persistProducts(next);
  }
  function remove(pid) {
    if (!window.confirm("Remove this product from the store?")) return;
    persistProducts(products.filter((p) => p.id !== pid));
  }

  return (
    <div className="k-fade">
      <h1 className="k-admin-title">Products &amp; stock</h1>
      {products.map((p) => {
        const sold = soldByProduct[p.id]?.units || 0;
        const total = p.colors.reduce((n, c) => n + c.sizes.reduce((m, s) => m + s.qty, 0), 0);
        return (
          <div key={p.id} className="k-admin-card k-prod-card">
            <div className="k-prod-head">
              <div className="k-prod-thumb"><Img src={p.colors[0].image} hex={p.colors[0].hex} alt={p.name} /></div>
              <div className="k-prod-meta">
                <h3>{p.name}</h3>
                <p className="k-prod-sub">{p.category} · cost {money(p.cost)} · price {money(p.price)} · sold {sold} · {total} in stock</p>
              </div>
              <button className="k-mini-del" onClick={() => remove(p.id)}><Ico name="trash" size={15} /></button>
            </div>
            {p.colors.map((c) => (
              <div key={c.name} className="k-color-row">
                <div className="k-color-tag"><i style={{ background: c.hex }} /> {c.name}</div>
                <div className="k-stock-grid">
                  {c.sizes.map((s) => (
                    <div key={s.size} className={`k-stock-cell ${s.qty > 0 && s.qty <= LOW_STOCK ? "is-low" : ""} ${s.qty === 0 ? "is-zero" : ""}`}>
                      <span className="k-stock-size">{s.size}</span>
                      <div className="k-stock-ctrl">
                        <button onClick={() => adjust(p.id, c.name, s.size, -1)}><Ico name="minus" size={12} /></button>
                        <span className="k-stock-qty">{s.qty}</span>
                        <button onClick={() => adjust(p.id, c.name, s.size, +1)}><Ico name="plus" size={12} /></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

function AdminAdd({ products, persistProducts, onDone }) {
  const [name, setName] = useState("");
  const [category, setCategory] = useState("Daywear");
  const [fabric, setFabric] = useState("");
  const [description, setDescription] = useState("");
  const [cost, setCost] = useState("");
  const [price, setPrice] = useState("");
  const [colors, setColors] = useState([blankColor()]);
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  function blankColor() {
    return { id: uid(), name: "", hex: "#B79E3A", image: null, sizes: SIZES_ALL.map((s) => ({ size: s, qty: 0 })) };
  }
  const setColor = (id, patch) => setColors((cs) => cs.map((c) => c.id === id ? { ...c, ...patch } : c));
  const setSizeQty = (id, size, qty) =>
    setColors((cs) => cs.map((c) => c.id !== id ? c : { ...c, sizes: c.sizes.map((s) => s.size === size ? { ...s, qty: Math.max(0, parseInt(qty || 0, 10)) } : s) }));

  async function upload(id, file) {
    if (!file) return;
    try { const data = await compressImage(file); setColor(id, { image: data }); }
    catch { setErr("Couldn’t read that image — try another file."); }
  }

  async function save() {
    setErr("");
    if (!name.trim()) return setErr("Give the product a name.");
    if (!(Number(cost) >= 0) || !(Number(price) > 0)) return setErr("Add a valid cost and selling price.");
    if (Number(price) <= Number(cost)) return setErr("Selling price should be above cost.");
    if (colors.some((c) => !c.name.trim())) return setErr("Name every colour.");
    setSaving(true);
    const product = {
      id: "p" + uid(), name: name.trim(), category, fabric: fabric.trim(),
      description: description.trim() || "A new Klyro piece.",
      cost: Number(cost), price: Number(price),
      colors: colors.map((c) => ({ name: c.name.trim(), hex: c.hex, image: c.image, sizes: c.sizes })),
    };
    await persistProducts([product, ...products]);
    setSaving(false);
    onDone();
  }

  return (
    <div className="k-fade">
      <h1 className="k-admin-title">Add a product</h1>
      <div className="k-admin-card">
        <div className="k-row2">
          <Input label="Product name" value={name} onChange={setName} placeholder="e.g. Seraphine Slip Gown" />
          <div className="k-field">
            <label className="k-label">Category</label>
            <input className="k-input" value={category} onChange={(e) => setCategory(e.target.value)} placeholder="Evening / Daywear / Bridal" />
          </div>
        </div>
        <Input label="Fabric & care" value={fabric} onChange={setFabric} placeholder="e.g. 100% silk · bias-cut · dry clean" />
        <div className="k-field">
          <label className="k-label">Description (shown to customers)</label>
          <textarea className="k-input k-textarea" value={description} onChange={(e) => setDescription(e.target.value)} rows={3} placeholder="Tell the story of the piece…" />
        </div>
        <div className="k-row2">
          <Input label={`Cost price (${CURRENCY.trim()}, admin only)`} value={cost} onChange={(v) => setCost(v.replace(/[^\d.]/g, ""))} placeholder="0" inputMode="numeric" />
          <Input label={`Selling price (${CURRENCY.trim()})`} value={price} onChange={(v) => setPrice(v.replace(/[^\d.]/g, ""))} placeholder="0" inputMode="numeric" />
        </div>
        {cost && price && Number(price) > Number(cost) && (
          <p className="k-margin-note">Margin per unit: <strong>{money(Number(price) - Number(cost))}</strong> ({Math.round(((price - cost) / price) * 100)}%)</p>
        )}
      </div>

      <div className="k-admin-card">
        <div className="k-color-builder-head">
          <h3>Colours, images &amp; stock</h3>
          <button className="k-btn k-btn-ghost k-sm" onClick={() => setColors((cs) => [...cs, blankColor()])}><Ico name="plus" size={14} /> Add colour</button>
        </div>

        {colors.map((c) => (
          <div key={c.id} className="k-builder-color">
            <div className="k-builder-top">
              <label className="k-img-upload">
                {c.image ? <img src={c.image} alt="" /> : <span className="k-img-hint"><Ico name="upload" size={16} /> Upload</span>}
                <input type="file" accept="image/*" onChange={(e) => upload(c.id, e.target.files?.[0])} />
              </label>
              <div className="k-builder-fields">
                <div className="k-row2">
                  <Input label="Colour name" value={c.name} onChange={(v) => setColor(c.id, { name: v })} placeholder="e.g. Champagne" />
                  <div className="k-field">
                    <label className="k-label">Swatch</label>
                    <div className="k-hex-row">
                      <input type="color" className="k-color-input" value={c.hex} onChange={(e) => setColor(c.id, { hex: e.target.value })} />
                      <input className="k-input" value={c.hex} onChange={(e) => setColor(c.id, { hex: e.target.value })} />
                    </div>
                  </div>
                </div>
                <label className="k-label">Stock per size</label>
                <div className="k-builder-sizes">
                  {c.sizes.map((s) => (
                    <div key={s.size} className="k-builder-size">
                      <span>{s.size}</span>
                      <input className="k-input k-qty-input" value={s.qty} inputMode="numeric"
                        onChange={(e) => setSizeQty(c.id, s.size, e.target.value)} />
                    </div>
                  ))}
                </div>
              </div>
              {colors.length > 1 && (
                <button className="k-mini-del" onClick={() => setColors((cs) => cs.filter((x) => x.id !== c.id))}><Ico name="trash" size={15} /></button>
              )}
            </div>
          </div>
        ))}
      </div>

      {err && <p className="k-err k-err-block"><Ico name="alert" size={14} /> {err}</p>}
      <div className="k-add-actions">
        <button className="k-btn k-btn-gold" disabled={saving} onClick={save}>{saving ? "Saving…" : "Publish product"}</button>
        <button className="k-btn k-btn-ghost" onClick={onDone}>Cancel</button>
      </div>
    </div>
  );
}

function AdminOrders({ orders }) {

    return (<div className="k-fade"><h1 className="k-admin-title">Orders</h1><p className="k-empty">No orders yet. They’ll appear here as customers check out.</p></div>);
  return (
    <div className="k-fade">
      <h1 className="k-admin-title">Orders</h1>
      {orders.map((o) => (
        <div key={o.id} className="k-admin-card k-order">
          <div className="k-order-head">
            <div>
              <strong>{o.id}</strong>
              <span className="k-order-date">{new Date(o.date).toLocaleString()}</span>
            </div>
            <span className="k-order-total">{money(o.total)}</span>

            <div className="k-order-cust">

            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

const CSS = `

/* Buttons */
.k-btn{display:inline-flex; align-items:center; justify-content:center; gap:9px; padding:14px 26px; font-size:12px; letter-spacing:.16em; text-transform:uppercase; border-radius:2px; transition:.2s; font-weight:400;}
.k-btn-gold{background:var(--gold); color:#fff;}
.k-btn-gold:hover{background:var(--gold-dark);}
.k-btn-gold:disabled{background:#D8CEAE; cursor:not-allowed; color:#fff;}
.k-btn-ghost{border:1px solid var(--line); color:var(--ink); background:var(--white);}
.k-btn-ghost:hover{border-color:var(--gold); color:var(--gold-dark);}
.k-full{width:100%;} .k-grow{flex:1;} .k-sm{padding:9px 16px;}

/* Filters */
.k-filters{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:8px 0 36px;}
.k-chip{padding:8px 18px; border:1px solid var(--line); border-radius:40px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); background:var(--white); transition:.2s;}
.k-chip.is-on{background:var(--ink); color:#fff; border-color:var(--ink);}

/* Grid */
.k-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:26px 22px; padding-bottom:80px;}
.k-card{cursor:pointer; background:transparent;}
.k-card-img{position:relative; aspect-ratio:3/4; border-radius:3px; overflow:hidden; background:var(--gold-soft);}
.k-img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s ease;}
.k-ph{width:100%; height:100%; display:block;}
.k-card:hover .k-img{transform:scale(1.04);}
.k-card:hover .k-card-name{color:var(--gold-dark);}
.k-sold{position:absolute; top:12px; left:12px; background:var(--white); color:var(--ink); font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:5px 10px; border-radius:2px;}
.k-card-body{padding:14px 2px 0;}
.k-card-cat{font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-dark);}
.k-card-name{font-family:var(--serif); font-size:21px; font-weight:500; margin:3px 0 8px; transition:color .2s;}
.k-card-foot{display:flex; align-items:center; justify-content:space-between;}
.k-price{font-size:14px; letter-spacing:.04em;}
.k-dots{display:flex; gap:5px;}
.k-dots i{width:11px; height:11px; border-radius:50%; box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);}
.k-empty{text-align:center; color:var(--muted); padding:50px 0; font-family:var(--serif); font-size:20px; font-style:italic;}

/* PDP */
.k-back{display:inline-flex; align-items:center; gap:7px; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); padding:26px 0 16px;}
.k-back:hover{color:var(--gold-dark);}
.k-pdp-grid{display:grid; grid-template-columns:1.05fr 1fr; gap:52px; padding-bottom:80px;}
.k-pdp-main{aspect-ratio:3/4; border-radius:4px; overflow:hidden; background:var(--gold-soft);}
.k-pdp-thumbs{display:flex; gap:10px; margin-top:12px;}
.k-thumb{width:62px; height:80px; border-radius:3px; overflow:hidden; border:1px solid var(--line); opacity:.7; transition:.2s; padding:0;}
.k-thumb.is-on{opacity:1; border-color:var(--gold);}
.k-pdp-info{padding-top:6px;}
.k-pdp-name{font-family:var(--serif); font-weight:500; font-size:clamp(28px,4vw,44px); line-height:1.05; margin:6px 0 10px;}
.k-pdp-price{font-size:19px; margin:0 0 22px; letter-spacing:.03em;}
.k-pdp-desc{color:var(--muted); margin:0 0 28px; max-width:42ch;}
.k-field{margin-bottom:22px;}
.k-label{display:block; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:10px;}
.k-label strong{color:var(--ink); font-weight:500; letter-spacing:.04em;}
.k-swatches{display:flex; gap:12px;}
.k-swatch{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid transparent; transition:.2s; padding:0;}
.k-swatch i{width:24px; height:24px; border-radius:50%; box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);}
.k-swatch.is-on{border-color:var(--gold);}
.k-sizes{display:flex; gap:9px; flex-wrap:wrap;}
.k-size{min-width:48px; padding:11px 8px; border:1px solid var(--line); border-radius:2px; font-size:13px; letter-spacing:.06em; background:var(--white); transition:.2s;}
.k-size:hover:not(:disabled){border-color:var(--gold);}
.k-size.is-on{background:var(--ink); color:#fff; border-color:var(--ink);}
.k-size.is-out{opacity:.4; cursor:not-allowed; text-decoration:line-through;}
.k-lowstock{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--gold-dark); margin:11px 0 0;}
.k-buyrow{display:flex; gap:12px; margin:8px 0 30px;}
.k-stepper{display:flex; align-items:center; border:1px solid var(--line); border-radius:2px; background:var(--white);}
.k-stepper button{width:42px; height:48px; display:flex; align-items:center; justify-content:center; color:var(--ink);}
.k-stepper span{min-width:34px; text-align:center; font-size:14px;}
.k-stepper-sm button{width:30px; height:30px;} .k-stepper-sm span{min-width:26px; font-size:13px;}
.k-spec{border-top:1px solid var(--line); padding-top:20px;}
.k-spec p{color:var(--muted); margin:8px 0 0; font-size:14px;}

/* Drawer */
.k-overlay{position:fixed; inset:0; background:rgba(42,38,32,.4); opacity:0; visibility:hidden; transition:.3s; z-index:50;}
.k-overlay.is-on{opacity:1; visibility:visible;}
.k-drawer{position:fixed; top:0; right:0; height:100%; width:420px; max-width:92vw; background:var(--paper); z-index:60; transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-20px 0 60px rgba(0,0,0,.12);}
.k-drawer.is-on{transform:none;}
.k-drawer-head{display:flex; align-items:center; justify-content:space-between; padding:22px; border-bottom:1px solid var(--line);}
.k-drawer-head h2{font-family:var(--serif); font-weight:500; font-size:24px; margin:0;}
.k-drawer-empty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; color:var(--muted); padding:30px;}
.k-drawer-items{flex:1; overflow-y:auto; padding:8px 22px;}
.k-line{display:flex; gap:14px; padding:18px 0; border-bottom:1px solid var(--line); position:relative;}
.k-line-img{width:74px; height:96px; border-radius:3px; overflow:hidden; flex-shrink:0; background:var(--gold-soft);}
.k-line-info{flex:1; min-width:0;}
.k-line-info h4{font-family:var(--serif); font-size:18px; font-weight:500; margin:0 0 3px;}
.k-line-meta{font-size:12px; color:var(--muted); margin:0 0 12px;}
.k-line-bottom{display:flex; align-items:center; justify-content:space-between;}
.k-line-price{font-size:14px;}
.k-line-rm{position:absolute; top:18px; right:0; color:var(--muted);}
.k-line-rm:hover{color:#9c4a2f;}
.k-drawer-foot{padding:20px 22px; border-top:1px solid var(--line);}
.k-subtotal{display:flex; justify-content:space-between; font-size:16px; margin-bottom:6px;}
.k-ship-note{font-size:12px; color:var(--muted); margin:0 0 16px;}

/* Checkout */
.k-checkout{padding-bottom:80px;}
.k-page-title{font-family:var(--serif); font-weight:500; font-size:clamp(30px,5vw,46px); margin:6px 0 30px;}
.k-checkout-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:40px; align-items:start;}
.k-panel{background:var(--white); border:1px solid var(--line); border-radius:4px; padding:28px; margin-bottom:22px;}
.k-panel .k-eyebrow{margin-bottom:20px;}
.k-input{width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:2px; background:var(--white); font-family:var(--sans); font-size:14px; color:var(--ink); transition:.2s;}
.k-input::placeholder{color:#B9B3A4;}
.k-input:focus{outline:none; border-color:var(--gold);}
.k-input.is-err{border-color:#C2562F;}
.k-textarea{resize:vertical;}
.k-row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.k-err{display:flex; align-items:center; gap:5px; color:#C2562F; font-size:12px; margin-top:6px;}
.k-err-block{margin:0 0 14px;}
.k-demo-note{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--gold-dark); background:var(--gold-soft); padding:10px 12px; border-radius:3px; margin:0 0 18px;}
.k-summary{background:var(--white); border:1px solid var(--line); border-radius:4px; padding:26px; position:sticky; top:90px;}
.k-summary h3{font-family:var(--serif); font-weight:500; font-size:22px; margin:0 0 18px;}
.k-sum-items{display:flex; flex-direction:column; gap:14px; margin-bottom:18px;}
.k-sum-line{display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:12px;}
.k-sum-img{position:relative; width:48px; height:62px; border-radius:3px; overflow:hidden; background:var(--gold-soft);}
.k-sum-qty{position:absolute; top:-7px; right:-7px; background:var(--ink); color:#fff; width:19px; height:19px; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center;}
.k-sum-name{font-family:var(--serif); font-size:15px; margin:0;}
.k-sum-meta{font-size:11px; color:var(--muted); margin:2px 0 0;}
.k-sum-rm{color:var(--muted);} .k-sum-rm:hover{color:#C2562F;}
.k-sum-price{font-size:13px; white-space:nowrap;}
.k-sum-totals{border-top:1px solid var(--line); padding-top:16px; margin-bottom:20px; display:flex; flex-direction:column; gap:9px;}
.k-sum-totals>div{display:flex; justify-content:space-between; font-size:14px; color:var(--muted);}
.k-sum-grand{color:var(--ink)!important; font-size:18px!important; font-weight:400; padding-top:9px; border-top:1px solid var(--line);}
.k-checkout-empty{text-align:center; padding:90px 0;}
.k-checkout-empty .k-pdp-name{margin-bottom:24px;}

/* Confirm */
.k-confirm{text-align:center; max-width:560px; margin:0 auto; padding:70px 0 90px;}
.k-confirm-mark{width:72px; height:72px; border-radius:50%; background:var(--gold-soft); color:var(--gold-dark); display:flex; align-items:center; justify-content:center; margin:0 auto 22px;}
.k-confirm-sub{color:var(--muted); margin:0 auto 30px; max-width:42ch;}
.k-confirm-card{background:var(--white); border:1px solid var(--line); border-radius:4px; padding:26px; text-align:left; margin-bottom:30px;}
.k-confirm-rows{display:flex; flex-direction:column; gap:10px; padding-bottom:18px; border-bottom:1px solid var(--line);}
.k-confirm-line{display:flex; justify-content:space-between; font-size:14px; gap:14px;}
.k-confirm-line em{color:var(--muted); font-style:normal;}
.k-confirm-ship{padding-top:18px;} .k-confirm-ship p{margin:8px 0 0; font-size:14px; line-height:1.7;}

/* Login */
.k-login{display:flex; align-items:center; justify-content:center; padding:70px 0 90px;}
.k-login-card{background:var(--white); border:1px solid var(--line); border-radius:5px; padding:42px 36px; width:100%; max-width:400px; text-align:center;}
.k-login-ico{color:var(--gold); margin-bottom:14px;}
.k-login-title{font-family:var(--serif); font-weight:500; font-size:30px; margin:6px 0 4px;}
.k-login-sub{color:var(--muted); font-size:14px; margin:0 0 24px;}
.k-login-card .k-input{margin-bottom:14px; text-align:center;}
.k-login-card .k-btn{margin-bottom:10px;}
.k-login-hint{font-size:12px; color:var(--muted); margin:14px 0 0;}
.k-login-hint code{background:var(--gold-soft); padding:2px 7px; border-radius:3px; color:var(--gold-dark);}

/* Admin */
.k-admin{display:grid; grid-template-columns:230px 1fr; min-height:calc(100vh - 0px); max-width:1280px; margin:0 auto;}
.k-admin-side{border-right:1px solid var(--line); padding:26px 18px; display:flex; flex-direction:column; background:var(--white); position:sticky; top:0; height:100vh;}
.k-admin-brand{margin-bottom:30px; padding:0 8px;}
.k-admin-brand .k-logo-word{font-size:34px; display:block; line-height:.9;}
.k-admin-brand small{font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted);}
.k-admin-side nav{display:flex; flex-direction:column; gap:4px;}
.k-admin-side nav button{display:flex; align-items:center; gap:11px; padding:12px 14px; border-radius:4px; font-size:13px; color:var(--muted); text-align:left; transition:.18s;}
.k-admin-side nav button:hover{background:var(--gold-soft); color:var(--ink);}
.k-admin-side nav button.is-on{background:var(--ink); color:#fff;}
.k-admin-exit{margin-top:auto; font-size:12px; letter-spacing:.1em; color:var(--muted); padding:12px 14px; text-align:left;}
.k-admin-exit:hover{color:var(--gold-dark);}
.k-admin-main{padding:34px 38px;}
.k-admin-title{font-family:var(--serif); font-weight:500; font-size:34px; margin:0 0 26px;}
.k-kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:26px;}
.k-kpi{background:var(--white); border:1px solid var(--line); border-radius:5px; padding:20px; display:flex; align-items:center; gap:15px;}
.k-kpi-accent{background:linear-gradient(135deg,#fff, var(--gold-soft));}
.k-kpi-ico{width:42px; height:42px; border-radius:9px; background:var(--gold-soft); color:var(--gold-dark); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.k-kpi-label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 4px;}
.k-kpi-value{font-family:var(--serif); font-size:26px; font-weight:500; margin:0;}
.k-admin-card{background:var(--white); border:1px solid var(--line); border-radius:6px; padding:24px; margin-bottom:20px;}
.k-admin-card h3{font-family:var(--serif); font-weight:500; font-size:21px; margin:0 0 18px;}
.k-table{width:100%; border-collapse:collapse; font-size:14px;}
.k-table th{text-align:left; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:400; padding:0 14px 12px; border-bottom:1px solid var(--line);}
.k-table td{padding:14px; border-bottom:1px solid var(--line);}
.k-table tr:last-child td{border-bottom:none;}
.k-pill{background:var(--gold-soft); color:var(--gold-dark); padding:3px 10px; border-radius:20px; font-size:12px;}
.k-pos{color:#3f7d4f;}

.k-prod-card{padding:20px 24px;}
.k-prod-head{display:flex; align-items:center; gap:16px; padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:14px;}
.k-prod-thumb{width:54px; height:70px; border-radius:4px; overflow:hidden; background:var(--gold-soft); flex-shrink:0;}
.k-prod-meta{flex:1;} .k-prod-meta h3{margin:0 0 3px; font-size:20px;}
.k-prod-sub{font-size:12px; color:var(--muted); margin:0;}
.k-mini-del{width:34px; height:34px; border-radius:6px; color:var(--muted); display:flex; align-items:center; justify-content:center; border:1px solid var(--line);}
.k-mini-del:hover{color:#C2562F; border-color:#e0bdae;}
.k-color-row{display:flex; align-items:center; gap:18px; padding:10px 0;}
.k-color-tag{display:flex; align-items:center; gap:8px; font-size:13px; min-width:120px;}
.k-color-tag i{width:15px; height:15px; border-radius:50%; box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);}
.k-stock-grid{display:flex; gap:10px; flex-wrap:wrap;}
.k-stock-cell{border:1px solid var(--line); border-radius:5px; padding:6px 8px; text-align:center; min-width:62px;}
.k-stock-cell.is-low{border-color:var(--gold); background:var(--gold-soft);}
.k-stock-cell.is-zero{opacity:.55;}
.k-stock-size{display:block; font-size:11px; letter-spacing:.1em; color:var(--muted); margin-bottom:3px;}
.k-stock-ctrl{display:flex; align-items:center; justify-content:center; gap:4px;}
.k-stock-ctrl button{width:22px; height:22px; border-radius:4px; background:var(--paper); display:flex; align-items:center; justify-content:center;}
.k-stock-ctrl button:hover{background:var(--gold-soft);}
.k-stock-qty{min-width:22px; font-size:14px;}

.k-color-builder-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.k-color-builder-head h3{margin:0;}
.k-builder-color{border:1px solid var(--line); border-radius:6px; padding:18px; margin-bottom:14px; background:var(--paper);}
.k-builder-top{display:flex; gap:18px; align-items:flex-start;}
.k-img-upload{width:96px; height:124px; border:1px dashed var(--line); border-radius:5px; overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; background:var(--white); position:relative;}
.k-img-upload img{width:100%; height:100%; object-fit:cover;}
.k-img-upload input{position:absolute; inset:0; opacity:0; cursor:pointer;}
.k-img-hint{display:flex; flex-direction:column; align-items:center; gap:6px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);}
.k-builder-fields{flex:1;}
.k-hex-row{display:flex; gap:8px; align-items:center;}
.k-color-input{width:46px; height:44px; border:1px solid var(--line); border-radius:3px; padding:3px; background:var(--white); cursor:pointer;}
.k-builder-sizes{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;}
.k-builder-size{text-align:center;}
.k-builder-size span{display:block; font-size:11px; color:var(--muted); margin-bottom:4px;}
.k-qty-input{width:58px; text-align:center; padding:8px;}
.k-margin-note{font-size:13px; color:var(--gold-dark); margin:4px 0 0;}
.k-add-actions{display:flex; gap:12px;}

.k-order-head{display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:14px;}
.k-order-date{font-size:12px; color:var(--muted); margin-left:12px;}
.k-order-total{font-family:var(--serif); font-size:20px;}
.k-order-body{display:grid; grid-template-columns:1.5fr 1fr; gap:24px;}
.k-order-items p{font-size:14px; margin:0 0 7px;} .k-order-items em{color:var(--muted); font-style:normal;}
.k-order-cust p{font-size:14px; line-height:1.7; margin:8px 0 0;}
.k-order-pay{color:var(--muted); font-size:13px!important;}

/* Footer */
.k-footer{text-align:center; padding:60px 22px 50px; border-top:1px solid var(--line); margin-top:30px;}
.k-foot-seal{width:64px; height:64px; border-radius:50%; object-fit:cover; margin-bottom:16px; box-shadow:0 8px 24px rgba(183,158,58,.22);}
.k-foot-tag{font-family:var(--serif); font-style:italic; font-size:18px; color:var(--ink); margin:0 0 14px;}
.k-foot-links{display:flex; gap:10px; justify-content:center; align-items:center; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);}
.k-foot-links button:hover{color:var(--gold-dark);}
.k-foot-fine{font-size:11px; color:#B9B3A4; margin:18px 0 0; letter-spacing:.05em;}

/* Responsive */
@media (max-width:1024px){
  .k-grid{grid-template-columns:repeat(3,1fr);}
  .k-kpis{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:860px){
  .k-only-mobile{display:inline-flex;} .k-only-desk{display:none;}
  .k-header-inner{grid-template-columns:1fr auto 1fr;}
  .k-pdp-grid{grid-template-columns:1fr; gap:28px;}
  .k-checkout-grid{grid-template-columns:1fr; gap:24px;}
  .k-summary{position:static;}
  .k-order-body{grid-template-columns:1fr; gap:16px;}
  .k-admin{grid-template-columns:1fr;}
  .k-admin-side{position:static; height:auto; flex-direction:row; flex-wrap:wrap; align-items:center; gap:10px; padding:14px;}
  .k-admin-brand{margin:0 12px 0 4px;} .k-admin-brand .k-logo-word{font-size:26px;}
  .k-admin-side nav{flex-direction:row; flex-wrap:wrap; flex:1;}
  .k-admin-side nav button{padding:9px 12px;}
  .k-admin-exit{margin:0;}
  .k-admin-main{padding:24px 18px;}
}
@media (max-width:560px){
  .k-grid{grid-template-columns:repeat(2,1fr); gap:18px 14px;}
  .k-hero{padding:50px 0 36px;}
  .k-row2{grid-template-columns:1fr;}
  .k-kpis{grid-template-columns:1fr 1fr;}
  .k-builder-top{flex-wrap:wrap;}
  .k-card-name{font-size:18px;}
  .k-table{font-size:12px;} .k-table th,.k-table td{padding:9px 8px;}
  .k-logo-word{font-size:34px;}
  .k-admin-side nav button span{display:inline;}
}
`;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
