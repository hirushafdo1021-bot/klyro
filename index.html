<!-- Klyro — luxury womenswear. Connected to Supabase (shared cloud database). -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Klyro — Elegant Womenswear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  :root{
    --ink:#211f18;--gold:#b79e3a;--gold-deep:#937e29;--gold-soft:#e9e1c4;
    --cream:#faf8f2;--paper:#ffffff;--line:#ece6d6;--muted:#8d8773;
    --ok:#3f7d52;--bad:#b4543e;--shadow:0 18px 50px -28px rgba(60,52,20,.35);
    --display:"Cormorant Garamond",Georgia,serif;--body:"Jost",system-ui,-apple-system,sans-serif;
    --script:"Pinyon Script","Cormorant Garamond",cursive;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--body);color:var(--ink);background:var(--cream);font-weight:300;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:.2px}
  img{max-width:100%;display:block}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:var(--body);font-weight:300}
  a{color:inherit;text-decoration:none}
  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-deep);font-weight:500}
  .muted{color:var(--muted)}
  h1,h2,h3{font-family:var(--display);font-weight:500;letter-spacing:.3px;margin:0}
  .hidden{display:none!important}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;padding:14px 30px;font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:400;border:1px solid var(--ink);background:var(--ink);color:#fff;transition:.25s;border-radius:2px}
  .btn:hover{background:var(--gold-deep);border-color:var(--gold-deep)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:#fff}
  .btn.gold{background:var(--gold);border-color:var(--gold)}
  .btn.gold:hover{background:var(--gold-deep);border-color:var(--gold-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.sm{padding:9px 18px;font-size:11px}
  .link{cursor:pointer;color:var(--gold-deep);border-bottom:1px solid transparent}
  .link:hover{border-color:var(--gold)}

  header{position:sticky;top:0;z-index:40;background:rgba(250,248,242,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar{max-width:1240px;margin:0 auto;padding:0 26px;height:74px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .navL,.navR{display:flex;align-items:center;gap:24px}
  .navR{justify-content:flex-end}
  .nav-link{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);padding:4px 0;position:relative;cursor:pointer}
  .nav-link::after{content:"";position:absolute;left:0;bottom:-2px;height:1px;width:0;background:var(--gold);transition:.25s}
  .nav-link:hover::after,.nav-link.active::after{width:100%}
  .brand{font-family:var(--script);font-size:40px;line-height:1;color:var(--gold);text-align:center;display:inline-flex;align-items:flex-start;cursor:pointer}
  .brand .hh{font-size:14px;margin-left:2px;margin-top:6px;color:var(--gold)}
  .cart-btn{position:relative;display:flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .cart-count{position:absolute;top:-8px;right:-12px;background:var(--gold);color:#fff;font-size:10px;min-width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500}
  .icon{width:19px;height:19px;stroke:var(--ink);fill:none;stroke-width:1.4}
  .acct{font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:8px}
  .acct .nm{color:var(--ink)}
  .searchbar{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--gold-soft);transform:translateY(-100%);transition:transform .3s cubic-bezier(.4,0,.1,1);box-shadow:var(--shadow)}
  .searchbar.on{transform:translateY(0)}
  .searchbar-inner{max-width:1240px;margin:0 auto;padding:0 26px;height:74px;display:flex;align-items:center;gap:14px}
  .searchbar-inner input{flex:1;border:none;background:none;font-size:22px;font-family:var(--display);color:var(--ink);outline:none}
  .searchbar-inner input::placeholder{color:var(--muted);font-style:italic}
  @media(max-width:640px){.searchbar-inner{height:62px;padding:0 16px}.searchbar-inner input{font-size:18px}}

  .hero{max-width:1240px;margin:0 auto;padding:64px 26px 40px;text-align:center}
  .hero .brand-xl{font-family:var(--script);font-size:clamp(64px,12vw,128px);color:var(--gold);line-height:.9}
  .hero h1{font-size:clamp(30px,5vw,52px);font-weight:400;margin:14px 0 0;line-height:1.08}
  .hero h1 em{font-style:italic;color:var(--gold-deep)}
  .hero p{max-width:520px;margin:18px auto 0;color:var(--muted);font-size:16px}
  .rule{width:54px;height:1px;background:var(--gold);margin:26px auto 0}

  .wrap{max-width:1240px;margin:0 auto;padding:0 26px 90px}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:46px 0 28px;padding-bottom:16px;border-bottom:1px solid var(--line)}
  .section-head h2{font-size:30px;font-weight:400}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:30px 26px}
  .card{background:var(--paper);border:1px solid var(--line);transition:.3s;cursor:pointer;overflow:hidden}
  .card:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:var(--gold-soft)}
  .card .ph{aspect-ratio:3/4;background:linear-gradient(135deg,#f3efe3,#e9e2cf);overflow:hidden;position:relative}
  .card .ph img{width:100%;height:100%;object-fit:cover;transition:.5s}
  .card:hover .ph img{transform:scale(1.05)}
  .tag{position:absolute;top:12px;left:12px;background:#fff;color:var(--gold-deep);font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:5px 11px;font-weight:500}
  .tag.soldout{background:var(--ink);color:#fff}
  .card .meta{padding:16px 16px 20px}
  .card .meta .nm{font-family:var(--display);font-size:21px;font-weight:500}
  .card .meta .fab{font-size:12px;color:var(--muted);letter-spacing:.05em;margin-top:2px}
  .card .meta .pr{margin-top:9px;font-size:15px;letter-spacing:.06em}
  .swatch-row{display:flex;gap:6px;margin-top:11px}
  .sw{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}

  .pd{display:grid;grid-template-columns:1.05fr .95fr;gap:54px;padding-top:30px}
  .gallery .main{aspect-ratio:3/4;background:#f1ece0;overflow:hidden;border:1px solid var(--line)}
  .gallery .main img{width:100%;height:100%;object-fit:cover}
  .thumbs{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .thumb{width:62px;height:80px;object-fit:cover;border:1px solid var(--line);cursor:pointer;opacity:.6;transition:.2s}
  .thumb.active{opacity:1;border-color:var(--gold)}
  .pd .info{padding-top:6px}
  .pd .info h1{font-size:40px;font-weight:400;line-height:1.05}
  .pd .price{font-size:23px;margin:14px 0;letter-spacing:.06em}
  .pd .desc{color:#55513f;font-size:15.5px;line-height:1.7;margin:18px 0;font-weight:300}
  .spec{display:flex;gap:30px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:16px 0;margin:20px 0}
  .spec div .k{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .spec div .v{font-family:var(--display);font-size:18px;margin-top:3px}
  .opt-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);margin:22px 0 11px;font-weight:500}
  .colors{display:flex;gap:12px;flex-wrap:wrap}
  .color-pick{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .color-pick .dot{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.15);outline:2px solid transparent;outline-offset:3px;transition:.2s}
  .color-pick.active .dot{outline-color:var(--gold)}
  .color-pick .cn{font-size:10px;letter-spacing:.08em;color:var(--muted)}
  .sizes{display:flex;gap:10px;flex-wrap:wrap}
  .size-col{display:flex;flex-direction:column;align-items:center;gap:5px}
  .size-cap{font-size:10.5px;letter-spacing:.03em;text-align:center}
  .size-cap .cap-low{color:var(--bad)}
  .size-cap .cap-out{color:var(--muted)}
  .size{min-width:50px;padding:11px 8px;text-align:center;border:1px solid var(--line);font-size:13px;letter-spacing:.1em;cursor:pointer;transition:.2s;background:#fff}
  .size:hover:not(.disabled){border-color:var(--ink)}
  .size.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .size.disabled{opacity:.32;cursor:not-allowed;text-decoration:line-through}
  .stockline{font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.04em}
  .stockline b{color:var(--gold-deep);font-weight:500}
  .size-avail{margin-top:10px}
  .size-avail .av-line{font-size:12px;color:var(--bad);letter-spacing:.04em;margin-top:3px}
  .qty{display:flex;align-items:center;border:1px solid var(--line);width:fit-content;margin:18px 0 4px}
  .qty button{width:42px;height:44px;font-size:18px}
  .qty span{width:46px;text-align:center;font-size:15px}
  .back{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:6px 0;cursor:pointer}
  .back:hover{color:var(--gold-deep)}

  .overlay{position:fixed;inset:0;background:rgba(33,31,24,.4);z-index:60;opacity:0;pointer-events:none;transition:.3s}
  .overlay.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--cream);z-index:70;transform:translateX(100%);transition:.35s cubic-bezier(.4,0,.1,1);display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:24px 26px;border-bottom:1px solid var(--line)}
  .drawer .dh h3{font-size:24px;font-weight:500}
  .x{font-size:24px;line-height:1;width:32px;height:32px;color:var(--muted)}
  .x:hover{color:var(--ink)}
  .cart-items{flex:1;overflow:auto;padding:10px 26px}
  .ci{display:grid;grid-template-columns:74px 1fr auto;gap:14px;padding:18px 0;border-bottom:1px solid var(--line)}
  .ci img{width:74px;height:96px;object-fit:cover;background:#eee}
  .ci .nm{font-family:var(--display);font-size:18px}
  .ci .vr{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:.04em}
  .ci .pr{margin-top:8px;font-size:13px}
  .ci .qmini{display:flex;align-items:center;border:1px solid var(--line);width:fit-content;margin-top:8px}
  .ci .qmini button{width:26px;height:26px;font-size:14px}
  .ci .qmini span{width:30px;text-align:center;font-size:12px}
  .ci .rm{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:8px;cursor:pointer}
  .ci .rm:hover{color:var(--bad)}
  .cart-foot{padding:22px 26px;border-top:1px solid var(--line);background:var(--paper)}
  .cart-foot .tot{font-family:var(--display);font-size:24px;margin:6px 0 16px;display:flex;justify-content:space-between;align-items:baseline}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .script{font-family:var(--script);font-size:54px;color:var(--gold-soft);line-height:1}

  .checkout{display:grid;grid-template-columns:1.2fr .8fr;gap:48px;padding-top:30px;align-items:start}
  .panel{background:var(--paper);border:1px solid var(--line);padding:30px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .field input,.field textarea,.field select{width:100%;padding:13px 14px;border:1px solid var(--line);background:#fff;font-size:14.5px;color:var(--ink);transition:.2s;border-radius:2px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .field.err input,.field.err textarea{border-color:var(--bad)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-title{font-size:24px;font-weight:500;margin-bottom:4px}
  .form-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
  .summary .si{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .summary .si .qn{color:var(--muted)}
  .note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.55}
  .card-badge{display:flex;gap:8px;margin-top:6px}
  .card-badge span{font-size:9px;letter-spacing:.1em;border:1px solid var(--line);padding:3px 7px;color:var(--muted);border-radius:3px}

  .auth{max-width:430px;margin:50px auto;background:var(--paper);border:1px solid var(--line);padding:38px}
  .auth .tabs2{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .auth .tab2{flex:1;text-align:center;padding:12px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer}
  .auth .tab2.active{color:var(--ink);border-color:var(--gold)}
  .auth-head{text-align:center;margin-bottom:6px}

  .confirm{max-width:560px;margin:60px auto;text-align:center;background:var(--paper);border:1px solid var(--line);padding:54px 40px}
  .confirm .ck{width:60px;height:60px;border-radius:50%;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
  .confirm h1{font-size:36px;font-weight:400}
  .confirm .ordno{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);margin:8px 0 18px}

  .admin-wrap{max-width:1240px;margin:0 auto;padding:30px 26px 90px}
  .admin-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:6px;flex-wrap:wrap}
  .admin-top h1{font-size:34px;font-weight:400}
  .role-badge{font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--gold-soft);color:var(--gold-deep);margin-left:10px;vertical-align:middle}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:22px 0 30px;flex-wrap:wrap}
  .tab{padding:12px 20px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:.2s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-color:var(--gold)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;margin-bottom:14px}
  .kpi{background:var(--paper);border:1px solid var(--line);padding:24px}
  .kpi .k{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .kpi .v{font-family:var(--display);font-size:36px;font-weight:500;margin-top:8px;letter-spacing:.5px}
  .kpi .v.gold{color:var(--gold-deep)}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px}
  table{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--line)}
  th,td{text-align:left;padding:14px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  th{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:500;background:#fcfaf4}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;letter-spacing:.05em}
  .pill.ok{background:#eaf2ec;color:var(--ok)}
  .pill.low{background:#fcf2ec;color:var(--bad)}
  .pill.out{background:#f0eee6;color:var(--muted)}
  .pill.unp{background:#fbf4e2;color:var(--gold-deep)}
  .stk-grid{display:flex;flex-wrap:wrap;gap:5px}
  .stk-grid .c{font-size:11px;border:1px solid var(--line);padding:2px 7px;border-radius:3px;color:var(--muted)}
  .stk-grid .c b{color:var(--ink);font-weight:500}
  .mini-sw{display:inline-block;width:11px;height:11px;border-radius:50%;border:1px solid rgba(0,0,0,.15);vertical-align:-1px;margin-right:5px}
  .prod-admin-img{width:46px;height:60px;object-fit:cover;background:#eee;border:1px solid var(--line)}
  .row-actions{display:flex;gap:8px}
  .ico-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid transparent;cursor:pointer}
  .ico-btn:hover{color:var(--gold-deep);border-color:var(--gold)}
  .ico-btn.del:hover{color:var(--bad);border-color:var(--bad)}

  .pform{background:var(--paper);border:1px solid var(--line);padding:30px;margin-top:6px}
  .color-block{border:1px solid var(--line);padding:18px;margin-bottom:16px;background:#fcfaf4;position:relative}
  .color-block .cbh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .color-block .cbh strong{font-family:var(--display);font-size:18px;font-weight:500}
  .img-drop{aspect-ratio:3/4;max-width:140px;border:1px dashed var(--gold-soft);background:#fff;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;overflow:hidden;color:var(--muted);font-size:11px;padding:10px}
  .img-drop img{width:100%;height:100%;object-fit:cover}
  .img-row{display:flex;flex-wrap:wrap;gap:10px}
  .img-thumb{position:relative;width:96px;height:128px;border:1px solid var(--line);overflow:hidden;background:#f1ece0}
  .img-thumb img{width:100%;height:100%;object-fit:cover}
  .img-thumb .cover{position:absolute;left:0;bottom:0;right:0;background:rgba(33,31,24,.72);color:#fff;font-size:9px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:3px}
  .img-thumb .img-x{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(33,31,24,.78);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
  .img-row .img-drop{width:96px;height:128px;max-width:none;aspect-ratio:auto}
  .avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:1px solid var(--gold-soft);background:#f1ece0}
  .avatar-wrap{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .size-stock{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
  .size-stock label{font-size:11px;letter-spacing:.1em;color:var(--muted);text-align:center;display:block;margin-bottom:5px}
  .size-stock input{text-align:center;padding:9px 4px}
  .color-cfg{display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:end}
  .color-cfg input[type=color]{height:42px;padding:3px;cursor:pointer}
  .locked-note{background:#fbf4e2;border:1px solid var(--gold-soft);padding:12px 14px;font-size:12px;color:var(--gold-deep);margin-bottom:18px;border-radius:3px}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:14px 26px;font-size:13px;letter-spacing:.08em;z-index:90;opacity:0;transition:.3s;border-radius:3px;max-width:90vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;color:var(--muted);gap:14px}
  .loader .script{font-family:var(--script);font-size:56px;color:var(--gold)}
  .spin{width:26px;height:26px;border:2px solid var(--gold-soft);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  footer{border-top:1px solid var(--line);background:var(--paper);margin-top:40px}
  .foot{max-width:1240px;margin:0 auto;padding:46px 26px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px}
  .foot .brand{font-size:32px}
  .foot .muted{font-size:12px;letter-spacing:.1em}

  @media(max-width:880px){.pd{grid-template-columns:1fr;gap:30px}.checkout{grid-template-columns:1fr;gap:26px}.pd .info h1{font-size:32px}}
  @media(max-width:640px){
    .bar{height:62px;padding:0 16px;gap:8px}.navL{display:none}.brand{font-size:30px}
    .navR{gap:16px}.acct .nm{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hero{padding:40px 18px 24px}.wrap{padding:0 16px 70px}

/* ---- password hashing (SHA-256, so raw passwords aren't stored) ---- */
async function hashPw(pw){
  try{const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
    return "h:"+Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
  catch(e){return "p:"+pw;}
}
async function pwMatches(input,stored){
  if(!stored) return false;
  if(stored.startsWith("h:")) return (await hashPw(input))===stored;
  if(stored.startsWith("p:")) return ("p:"+input)===stored;
  return input===stored; // legacy plain
}

/* ---------- image compression ---------- */
function compressImage(file,max=1200,quality=0.85){
  return new Promise((res,rej)=>{const fr=new FileReader();
    fr.onload=()=>{const img=new Image();img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",quality));
    };img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});
}
function ph(hex){const h=hex||"#d8cfa8";return "data:image/svg+xml;utf8,"+encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 400'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${h}' stop-opacity='.85'/><stop offset='1' stop-color='${h}' stop-opacity='.4'/></linearGradient></defs><rect width='300' height='400' fill='${h}' opacity='.18'/><rect width='300' height='400' fill='url(%23g)' opacity='.5'/><text x='150' y='205' font-family='Cormorant Garamond,serif' font-size='34' fill='%23ffffff' opacity='.8' text-anchor='middle'>Klyro</text></svg>`);}
const imgOf=c=>{if(c.images&&c.images.length)return c.images[0];if(c.image&&c.image.length>40)return c.image;return ph(c.hex);};
const imagesOf=c=>(c.images&&c.images.length)?c.images:(c.image&&c.image.length>40?[c.image]:[]);

/* ---- resize (gently) then upload full-quality image to Supabase Storage ---- */
function resizeToBlob(file,max=1600,quality=0.92){
  return new Promise((res,rej)=>{const fr=new FileReader();
    fr.onload=()=>{const img=new Image();img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error("blob")),"image/jpeg",quality);
    };img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});
}
async function uploadImage(file,folder="products"){
  const blob=await resizeToBlob(file);
  const path=folder+"/"+uid()+"-"+Date.now()+".jpg";
  const up=await sb.storage.from("klyro").upload(path,blob,{contentType:"image/jpeg",upsert:false});
  if(up.error)throw up.error;
  return sb.storage.from("klyro").getPublicUrl(path).data.publicUrl;
}

/* ============================================================
   CART
   ============================================================ */
function addToCart(p,c){
  if(!view.size){toast("Please select a size");return false;}
  const avail=Number(c.stock?.[view.size])||0;
  if(avail<=0){toast("That size is sold out");return false;}
  const key=p.id+"|"+c.id+"|"+view.size;const ex=cart.find(i=>i.key===key);const already=ex?ex.qty:0;
  if(already+view.qty>avail){toast(`Only ${avail} available`);return false;}
  if(ex)ex.qty+=view.qty;
  else cart.push({key,productId:p.id,name:p.name,colorId:c.id,colorName:c.name,hex:c.hex,image:imgOf(c),size:view.size,qty:view.qty,price:p.price});
  updateCartCount();toast("Added to cart");return true;
}
const cartTotal=()=>cart.reduce((t,i)=>t+i.price*i.qty,0);
function updateCartCount(){const n=cart.reduce((t,i)=>t+i.qty,0);const el=document.getElementById("cartCount");
  el.textContent=n;el.classList.toggle("hidden",n===0);renderCart();}
function renderCart(){
  const wrap=document.getElementById("cartItems"),foot=document.getElementById("cartFoot");
  if(!cart.length){wrap.innerHTML=`<div class="empty"><div class="script">It's empty</div><p>Your cart is waiting. Find something you love.</p></div>`;
    foot.innerHTML=`<button class="btn ghost" style="width:100%" id="keepShop">Continue shopping</button>`;
    document.getElementById("keepShop").onclick=closeCart;return;}
  wrap.innerHTML="";
  cart.forEach(i=>{const stk=stockFor(i.productId,i.colorId,i.size);const el=document.createElement("div");el.className="ci";
    el.innerHTML=`<img src="${i.image}"><div><div class="nm">${escapeHtml(i.name)}</div>
      <div class="vr"><span class="mini-sw" style="background:${i.hex}"></span>${escapeHtml(i.colorName)} · Size ${i.size}</div>
      <div class="pr">${fmt(i.price)}</div>
      <div class="qmini"><button data-a="d">−</button><span>${i.qty}</span><button data-a="i">+</button></div>
      <div class="rm" data-a="r">Remove</div></div>
      <div style="text-align:right;font-size:14px">${fmt(i.price*i.qty)}</div>`;
    el.querySelector('[data-a=d]').onclick=()=>{i.qty=Math.max(1,i.qty-1);updateCartCount();};
    el.querySelector('[data-a=i]').onclick=()=>{if(i.qty<stk){i.qty++;updateCartCount();}else toast(`Only ${stk} in stock`);};
    el.querySelector('[data-a=r]').onclick=()=>{cart=cart.filter(x=>x!==i);updateCartCount();};wrap.appendChild(el);});
  foot.innerHTML=`<div class="tot"><span>Total</span><span>${fmt(cartTotal())}</span></div>
    <button class="btn gold" style="width:100%" id="goCheckout">Checkout</button>
    <div class="note">Shipping calculated at delivery. Limited stock held for 15 minutes.</div>`;
  document.getElementById("goCheckout").onclick=()=>{closeCart();proceedCheckout();};
}
function stockFor(pid,cid,sz){const p=db.products.find(x=>x.id===pid);if(!p)return 0;const c=p.colors.find(x=>x.id===cid);if(!c)return 0;return Number(c.stock?.[sz])||0;}

const emailOk=e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
async function customerRegister(){
  const firstName=val("r_name"),lastName=val("r_lname"),email=val("r_email").toLowerCase(),phone=val("r_phone"),whatsapp=val("r_whatsapp"),pass=val("r_pass"),pass2=val("r_pass2");
  const name=(firstName+" "+lastName).trim();
  if(!firstName){toast("Enter your first name");return;}
  if(!lastName){toast("Enter your last name");return;}
  if(!emailOk(email)){toast("Enter a valid email");return;}
  if(!phone){toast("Enter your phone number");return;}
  if(pass.length<6){toast("Password must be 6+ characters");return;}
  if(pass!==pass2){toast("Passwords don't match");return;}
  if(email===CONFIG.admin.email.toLowerCase()||db.staff.some(s=>s.email.toLowerCase()===email)){toast("That email is reserved for staff");return;}
  if(db.users.some(u=>u.email.toLowerCase()===email)){toast("An account with this email already exists");return;}
  const btn=document.getElementById("doReg");btn.disabled=true;btn.textContent="Creating…";
  try{
    const user={id:uid(),name,firstName,lastName,email,phone,whatsapp,password:await hashPw(pass),address:{a1:"",a2:"",a3:""},createdAt:new Date().toISOString()};
    await saveCustomer(user);db.users.push(user);

  }catch(e){console.error(e);toast("Couldn't create account — check your connection");btn.disabled=false;btn.textContent="Create account";}

async function customerSignin(email,pass){
  email=(email||"").toLowerCase();
  // Admin (owner) — full access
  if(email===CONFIG.admin.email.toLowerCase()&&pass===CONFIG.admin.password){
    session={role:"admin",id:"admin"};sesSave();renderAcct();toast("Welcome, Admin");view.adminTab="dashboard";go("admin");return;
  }
  // Page editor
  const ed=db.staff.find(s=>s.email.toLowerCase()===email);
  if(ed&&await pwMatches(pass,ed.password)){
    session={role:"editor",id:ed.id};sesSave();renderAcct();toast("Welcome, "+ed.name);view.adminTab="products";go("admin");return;
  }
  // Customer
  const u=db.users.find(u=>u.email.toLowerCase()===email);
  if(!u||!(await pwMatches(pass,u.password))){toast("Incorrect email or password");return;}
  session={role:"customer",id:u.id};sesSave();sendWelcome(u);toast("Signed in");afterLogin();
}

    document.getElementById("doReset").onclick=doReset;

async function sendResetCode(){
  const email=(view.step===2&&resetState?resetState.email:val("rs_email")).toLowerCase();
  if(!emailOk(email)){toast("Enter a valid email");return;}
  const u=db.users.find(x=>x.email.toLowerCase()===email);
  const ed=db.staff.find(s=>s.email.toLowerCase()===email);
  const acct=u||ed;
  if(!acct){toast("No account found with that email");return;}
  if(!window.emailjs){toast("Email service unavailable right now");return;}
  const btn=document.getElementById("sendCode")||document.getElementById("resend");
  if(btn){btn.disabled=true;btn.textContent="Sending…";}
  const code=""+Math.floor(100000+Math.random()*900000);
  const ok=await sendEmail(EMAIL.resetTemplate,{name:acct.firstName||acct.name,email:acct.email,code});
  if(!ok){toast("Couldn't send the email — try again");if(btn){btn.disabled=false;btn.textContent="Email me a code";}return;}
  resetState={email,code,expires:Date.now()+15*60*1000,kind:u?"customer":"editor",id:acct.id};
  toast("Code sent — check your email");
  go("reset",{step:2});
}
async function doReset(){
  if(!resetState){go("reset",{step:1});return;}
  const code=val("rs_code"),p1=val("rs_p1"),p2=val("rs_p2");
  if(Date.now()>resetState.expires){toast("Code expired — request a new one");return;}
  if(code!==resetState.code){toast("Incorrect code");return;}
  if(p1.length<6){toast("Password must be 6+ characters");return;}
  if(p1!==p2){toast("Passwords don't match");return;}
  const btn=document.getElementById("doReset");btn.disabled=true;btn.textContent="Updating…";
  try{
    const hashed=await hashPw(p1);
    if(resetState.kind==="customer"){const a=db.users.find(x=>x.id===resetState.id);a.password=hashed;await saveCustomer(a);}
    else{const a=db.staff.find(s=>s.id===resetState.id);a.password=hashed;await saveStaff(a);}
    resetState=null;toast("Password updated — please sign in");go("auth");
  }catch(e){console.error(e);toast("Update failed — try again");btn.disabled=false;btn.textContent="Set new password";}
}

async function placeOrder(){
  const g=id=>document.getElementById(id).value.trim();
  const f={name:g("f_name"),phone:g("f_phone"),a1:g("f_a1"),a2:g("f_a2"),a3:g("f_a3"),
    cardname:g("f_cardname"),cardno:g("f_cardno").replace(/\s/g,""),exp:g("f_exp"),cvc:g("f_cvc")};
  document.querySelectorAll(".field").forEach(x=>x.classList.remove("err"));
  const req=["name","phone","a1","a3","cardname","cardno","exp","cvc"];let bad=null;
  req.forEach(k=>{if(!f[k]){document.querySelector(`[data-f=${k}]`)?.classList.add("err");bad=bad||k;}});
  if(f.cardno&&f.cardno.length<15){document.querySelector("[data-f=cardno]").classList.add("err");bad=bad||"cardno";}
  if(bad){toast("Please complete the highlighted fields");document.querySelector(".field.err input")?.focus();return;}
  for(const i of cart){if(stockFor(i.productId,i.colorId,i.size)<i.qty){toast(`${i.name} (${i.colorName}/${i.size}) no longer has enough stock`);return;}}
  const btn=document.getElementById("placeOrder");btn.disabled=true;btn.textContent="Processing…";

  /* === PAYMENT GATEWAY GOES HERE (PayHere / Stripe via a server) === */

  try{
    const u=currentUser();const touched={};
    const items=cart.map(i=>{const p=db.products.find(x=>x.id===i.productId);const c=p.colors.find(x=>x.id===i.colorId);
      c.stock[i.size]=Math.max(0,(Number(c.stock[i.size])||0)-i.qty);touched[p.id]=p;
      return {productId:i.productId,name:i.name,colorName:i.colorName,size:i.size,qty:i.qty,price:i.price,cost:p.cost||0};});
    u.address={a1:f.a1,a2:f.a2,a3:f.a3};
    const order={id:"KLY-"+Date.now().toString().slice(-6),date:new Date().toISOString(),userId:u.id,
      customer:{name:f.name,email:u.email,phone:f.phone,address:[f.a1,f.a2,f.a3].filter(Boolean)},
      items,total:cart.reduce((t,i)=>t+i.price*i.qty,0),card:"•••• "+f.cardno.slice(-4),payment:"Paid (demo)"};
    await saveOrder(order);
    await Promise.all(Object.values(touched).map(saveProduct));
    await saveCustomer(u);
    db.orders.unshift(order);
    cart=[];updateCartCount();go("confirm",{lastOrder:order});
  }catch(e){console.error(e);toast("Order failed — please try again");btn.disabled=false;btn.textContent="Pay "+fmt(cartTotal());}
}

function adminDashboard(el){
  const sales=salesByProduct();
  const revenue=db.orders.reduce((t,o)=>t+o.total,0);
  const profit=Object.values(sales).reduce((t,s)=>t+s.profit,0);
  const units=Object.values(sales).reduce((t,s)=>t+s.units,0);
  const inv=db.products.reduce((t,p)=>t+productStock(p)*p.price,0);
  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="k">Total revenue</div><div class="v">${fmt(revenue)}</div><div class="sub">${db.orders.length} order${db.orders.length===1?"":"s"}</div></div>
      <div class="kpi"><div class="k">Total profit</div><div class="v gold">${fmt(profit)}</div><div class="sub">After cost of goods</div></div>
      <div class="kpi"><div class="k">Units sold</div><div class="v">${units}</div><div class="sub">${db.users.length} registered customer${db.users.length===1?"":"s"}</div></div>
      <div class="kpi"><div class="k">Inventory value</div><div class="v">${fmt(inv)}</div><div class="sub">At retail price</div></div></div>
    <div class="note" style="margin:0 0 22px">Live data from your Supabase cloud database. Payments settle to the Klyro account once a payment gateway (PayHere / Stripe) is connected.</div>
    <div class="section-head"><div><div class="eyebrow">Per product</div><h2 style="font-size:24px">Profit &amp; performance</h2></div></div>
    <table><thead><tr><th>Product</th><th>Cost</th><th>Sell</th><th>Margin</th><th>Sold</th><th>Profit</th><th>In stock</th></tr></thead><tbody>
      ${db.products.map(p=>{const s=sales[p.id]||{units:0,profit:0};const m=p.price-(p.cost||0);const stock=productStock(p);
        return `<tr><td><span class="mini-sw" style="background:${p.colors[0]?.hex||'#ccc'}"></span>${escapeHtml(p.name)}<div class="muted" style="font-size:11px">${escapeHtml(p.fabric)}</div></td>
          <td>${fmt(p.cost)}</td><td>${isPriced(p)?fmt(p.price):'<span class="pill unp">Unpriced</span>'}</td>
          <td>${isPriced(p)?fmt(m)+` <span class="muted">(${Math.round(m/p.price*100)}%)</span>`:'—'}</td>
          <td>${s.units}</td><td><b style="color:var(--gold-deep)">${fmt(s.profit)}</b></td>
          <td>${stock<=0?'<span class="pill out">Sold out</span>':(stock<=CONFIG.lowStock?`<span class="pill low">${stock} left</span>`:`<span class="pill ok">${stock}</span>`)}</td></tr>`;}).join("")
        ||`<tr><td colspan="7" class="muted" style="text-align:center;padding:30px">No products yet.</td></tr>`}
    </tbody></table>`;
}
function adminProducts(el){
  const admin=isAdmin();
  el.innerHTML=`
    <div class="admin-top" style="margin-bottom:18px"><div class="muted" style="font-size:13px">${db.products.length} product${db.products.length===1?"":"s"} · stock by colour &amp; size${admin?"":" · pricing by admin"}</div>
      <button class="btn gold sm" id="addNew">+ Add product</button></div>
    <table><thead><tr><th>Product</th><th>${admin?"Price":"Selling price"}</th><th>Stock by colour / size</th><th></th></tr></thead><tbody>
      ${db.products.map(p=>`<tr>
        <td style="display:flex;gap:12px;align-items:center"><img class="prod-admin-img" src="${imgOf(p.colors[0])}"><div>${escapeHtml(p.name)}<div class="muted" style="font-size:11px">${escapeHtml(p.fabric)}</div></div></td>
        <td>${isPriced(p)?fmt(p.price):'<span class="pill unp">Unpriced</span>'}${admin?`<div class="muted" style="font-size:11px">cost ${fmt(p.cost)}</div>`:""}</td>
        <td>${p.colors.map(c=>`<div style="margin-bottom:8px"><div style="font-size:12px;margin-bottom:3px"><span class="mini-sw" style="background:${c.hex}"></span>${escapeHtml(c.name)} <span class="muted">· ${colorStock(c)} total</span></div>
          <div class="stk-grid">${SIZES.map(s=>`<span class="c">${s} <b>${Number(c.stock?.[s])||0}</b></span>`).join("")}</div></div>`).join("")}</td>
        <td><div class="row-actions"><span class="ico-btn" data-edit="${p.id}">Edit</span>${admin?`<span class="ico-btn del" data-del="${p.id}">Delete</span>`:""}</div></td></tr>`).join("")
        ||`<tr><td colspan="4" class="muted" style="text-align:center;padding:30px">No products yet — add your first dress.</td></tr>`}
    </tbody></table>`;
  document.getElementById("addNew").onclick=()=>{view.editing=null;view.adminTab="add";renderAdmin();};
  el.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{view.editing=b.dataset.edit;view.adminTab="add";renderAdmin();});
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{if(confirm("Delete this product? This cannot be undone.")){
    try{await deleteProductRow(b.dataset.del);db.products=db.products.filter(p=>p.id!==b.dataset.del);toast("Product deleted");renderAdmin();}
    catch(e){console.error(e);toast("Delete failed — try again");}}});
}
let formColors=[];
function adminForm(el){
  const admin=isAdmin();
  const editing=view.editing?db.products.find(p=>p.id===view.editing):null;
  formColors=editing?JSON.parse(JSON.stringify(editing.colors)):[newColor()];
  el.innerHTML=`
    <div class="pform"><div class="form-title">${editing?"Edit product":"Add a new dress"}</div>
      <div class="form-sub">${admin?"Cost &amp; selling price drive profit reporting. Add one image per colour.":"Add product details and stock. Pricing is set by the admin."}</div>
      ${admin?"":'<div class="locked-note">🔒 Cost price, selling price and profit are managed by the admin. Products you add stay hidden from the shop until the admin sets a selling price.</div>'}
      <div class="two"><div class="field"><label>Product name</label><input id="p_name" value="${editing?escapeAttr(editing.name):""}" placeholder="e.g. Aurelia Slip Gown"></div>
        <div class="field"><label>Fabric</label><input id="p_fabric" value="${editing?escapeAttr(editing.fabric):""}" placeholder="e.g. Silk Charmeuse"></div></div>
      <div class="field"><label>Description (shown to customers)</label><textarea id="p_desc" rows="3" placeholder="Describe the cut, feel and details…">${editing?escapeHtml(editing.desc):""}</textarea></div>
      ${admin?`<div class="two"><div class="field"><label>Cost price (${CONFIG.currency})</label><input id="p_cost" type="number" min="0" value="${editing?editing.cost:""}" placeholder="What it costs you"></div>
        <div class="field"><label>Selling price (${CONFIG.currency})</label><input id="p_price" type="number" min="0" value="${editing?editing.price:""}" placeholder="What customers pay"></div></div>
        <div id="marginHint" class="note"></div>`:""}
      <div class="opt-label" style="margin-top:24px">Colours &amp; stock</div>
      <div id="colorBlocks"></div>
      <button class="btn ghost sm" id="addColor" style="margin-top:4px">+ Add another colour</button>
      <div style="margin-top:28px;display:flex;gap:12px">
        <button class="btn gold" id="saveProduct">${editing?"Save changes":"Add product"}</button>
        <button class="btn ghost" id="cancelForm">Cancel</button></div></div>`;
  function syncForm(){formColors.forEach((col,idx)=>{const nm=document.getElementById(`cname_${idx}`);if(nm)col.name=nm.value;
    const hx=document.getElementById(`chex_${idx}`);if(hx)col.hex=hx.value;
    SIZES.forEach(s=>{const i=document.getElementById(`stk_${idx}_${s}`);if(i)col.stock[s]=Number(i.value)||0;});});}
  function renderColorBlocks(){const cb=document.getElementById("colorBlocks");cb.innerHTML="";
    formColors.forEach((col,idx)=>{if(!col.images)col.images=imagesOf(col);const block=document.createElement("div");block.className="color-block";
      block.innerHTML=`<div class="cbh"><strong>Colour ${idx+1}</strong>${formColors.length>1?`<span class="ico-btn del" data-rmc="${idx}">Remove</span>`:""}</div>
        <div><div class="opt-label" style="margin:0 0 8px">Photos <span style="text-transform:none;letter-spacing:0;color:var(--muted)">(first is the cover · add as many as you like)</span></div>
          <div class="img-row" id="imgrow_${idx}">
            ${col.images.map((src,i)=>`<div class="img-thumb"><img src="${src}">${i===0?'<span class="cover">Cover</span>':''}<span class="img-x" data-rmimg="${idx}_${i}">×</span></div>`).join("")}
            <label class="img-drop" id="drop_${idx}">+ Add<br>photo</label>
            <input type="file" accept="image/*" id="file_${idx}" class="hidden" multiple>
          </div></div>
        <div style="margin-top:14px"><div class="color-cfg"><div class="field" style="margin:0"><label>Colour name</label><input id="cname_${idx}" value="${escapeAttr(col.name)}" placeholder="e.g. Champagne"></div>
            <div class="field" style="margin:0"><label>Swatch</label><input type="color" id="chex_${idx}" value="${col.hex||'#b79e3a'}"></div></div>
            <div class="size-stock">${SIZES.map(s=>`<div><label>${s}</label><input type="number" min="0" id="stk_${idx}_${s}" value="${Number(col.stock?.[s])||0}"></div>`).join("")}</div></div>`;cb.appendChild(block);});
    formColors.forEach((col,idx)=>{const file=document.getElementById(`file_${idx}`);
      document.getElementById(`drop_${idx}`).onclick=()=>file.click();
      file.onchange=async()=>{const files=[...file.files];if(!files.length)return;syncForm();
        const drop=document.getElementById(`drop_${idx}`);drop.textContent="Uploading…";
        try{for(const f of files){const url=await uploadImage(f);formColors[idx].images.push(url);}toast("Photo added");}
        catch(e){console.error(e);toast("Upload failed — is the 'klyro' bucket set up?");}
        renderColorBlocks();};});
    cb.querySelectorAll("[data-rmimg]").forEach(b=>b.onclick=()=>{syncForm();const[ci,ii]=b.dataset.rmimg.split("_").map(Number);formColors[ci].images.splice(ii,1);renderColorBlocks();});
    cb.querySelectorAll("[data-rmc]").forEach(b=>b.onclick=()=>{syncForm();formColors.splice(+b.dataset.rmc,1);renderColorBlocks();});}
  renderColorBlocks();
  if(admin){const updateMargin=()=>{const c=+document.getElementById("p_cost").value,pr=+document.getElementById("p_price").value;const h=document.getElementById("marginHint");
    if(c>0&&pr>0){const m=pr-c;h.innerHTML=`Margin per unit: <b style="color:var(--gold-deep)">${fmt(m)}</b> (${Math.round(m/pr*100)}%)${m<0?' — selling below cost!':''}`;}else h.innerHTML="";};
    document.getElementById("p_cost").oninput=updateMargin;document.getElementById("p_price").oninput=updateMargin;updateMargin();}
  document.getElementById("addColor").onclick=()=>{syncForm();formColors.push(newColor());renderColorBlocks();};
  document.getElementById("cancelForm").onclick=()=>{view.editing=null;view.adminTab="products";renderAdmin();};
  document.getElementById("saveProduct").onclick=async()=>{syncForm();
    const name=document.getElementById("p_name").value.trim();
    const fabric=document.getElementById("p_fabric").value.trim();
    const desc=document.getElementById("p_desc").value.trim();
    if(!name){toast("Add a product name");return;}
    if(formColors.some(c=>!c.name.trim())){toast("Name every colour");return;}
    let cost=editing?editing.cost:0,price=editing?editing.price:0;
    if(admin){cost=+document.getElementById("p_cost").value||0;price=+document.getElementById("p_price").value||0;
      if(!(cost>0)||!(price>0)){toast("Add cost and selling price");return;}}
    const product={id:editing?editing.id:uid(),name,fabric:fabric||"—",desc,cost,price,
      created:editing?(editing.created||Date.now()):Date.now(),
      colors:formColors.map(c=>({id:c.id||uid(),name:c.name.trim(),hex:c.hex||"#b79e3a",images:(c.images||imagesOf(c)),
        stock:Object.fromEntries(SIZES.map(s=>[s,Number(c.stock?.[s])||0]))}))};
    const sbtn=document.getElementById("saveProduct");sbtn.disabled=true;sbtn.textContent="Saving…";
    try{
      await saveProduct(product);
      if(editing){const i=db.products.findIndex(p=>p.id===editing.id);db.products[i]=product;}else db.products.push(product);
      toast(editing?"Product updated":(isPriced(product)?"Product added":"Saved — awaiting admin pricing"));
      view.editing=null;view.adminTab="products";renderAdmin();
    }catch(e){console.error(e);toast("Save failed — check your connection");sbtn.disabled=false;sbtn.textContent=editing?"Save changes":"Add product";}};
}
function newColor(){return {id:uid(),name:"",hex:"#b79e3a",images:[],stock:Object.fromEntries(SIZES.map(s=>[s,0]))};}
function adminOrders(el){
  if(!db.orders.length){el.innerHTML=`<div class="empty"><div class="script">No orders yet</div><p>Orders placed by customers will appear here with shipping details.</p></div>`;return;}
  el.innerHTML=`<table><thead><tr><th>Order</th><th>Customer</th><th>Ship to</th><th>Items</th><th>Total</th><th>Payment</th></tr></thead><tbody>
    ${db.orders.map(o=>`<tr><td>${o.id}<div class="muted" style="font-size:11px">${new Date(o.date).toLocaleString()}</div></td>
      <td>${escapeHtml(o.customer.name)}<div class="muted" style="font-size:11px">${escapeHtml(o.customer.email||"")}<br>${escapeHtml(o.customer.phone)}</div></td>
      <td style="font-size:12px;color:var(--muted);line-height:1.5">${o.customer.address.map(escapeHtml).join("<br>")}</td>
      <td style="font-size:12px">${o.items.map(it=>`${it.qty}× ${escapeHtml(it.name)} <span class="muted">(${escapeHtml(it.colorName)}/${it.size})</span>`).join("<br>")}</td>
      <td><b>${fmt(o.total)}</b></td><td><span class="pill ok">${o.payment}</span><div class="muted" style="font-size:11px;margin-top:3px">${o.card}</div></td></tr>`).join("")}
  </tbody></table>`;
}
function adminCustomers(el){
  if(!db.users.length){el.innerHTML=`<div class="empty"><div class="script">No customers yet</div><p>Registered customer accounts will appear here.</p></div>`;return;}
  el.innerHTML=`<div class="admin-top" style="margin-bottom:18px"><div class="muted" style="font-size:13px">${db.users.length} registered customer${db.users.length===1?"":"s"}</div></div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>WhatsApp</th><th>Address</th><th>Orders</th><th>Spent</th><th>Joined</th></tr></thead><tbody>
    ${db.users.map(u=>{const os=db.orders.filter(o=>o.userId===u.id);const spent=os.reduce((t,o)=>t+o.total,0);
      return `<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.phone)}</td>
        <td>${u.whatsapp?escapeHtml(u.whatsapp):'<span class="muted">—</span>'}</td>
        <td style="font-size:12px;color:var(--muted)">${[u.address.a1,u.address.a2,u.address.a3].filter(Boolean).map(escapeHtml).join(", ")||"—"}</td>
        <td>${os.length}</td><td><b>${fmt(spent)}</b></td><td class="muted" style="font-size:12px">${new Date(u.createdAt).toLocaleDateString()}</td></tr>`;}).join("")}
  </tbody></table>`;
}
function adminTeam(el){
  el.innerHTML=`<div class="two" style="gap:24px;align-items:start"><div>
      <div class="section-head" style="margin-top:0"><div><div class="eyebrow">Accounts</div><h2 style="font-size:24px">Staff &amp; roles</h2></div></div>
      <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead><tbody>
        <tr><td>${escapeHtml(CONFIG.admin.name)}</td><td>${escapeHtml(CONFIG.admin.email)}</td><td><span class="pill ok">Admin</span></td><td class="muted" style="font-size:11px">Full access</td></tr>
        ${db.staff.map(s=>`<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.email)}</td><td><span class="pill unp">Page editor</span></td>
          <td><span class="ico-btn del" data-rms="${s.id}">Remove</span></td></tr>`).join("")}
      </tbody></table>
      <div class="note">Page editors manage catalog &amp; stock only. They cannot see cost prices, profit, orders or customer data.</div></div>
      <div class="panel"><div class="form-title">Add page editor</div><div class="form-sub">Create a catalog-only login.</div>
        <div class="field"><label>Name</label><input id="e_name" placeholder="Editor name"></div>
        <div class="field"><label>Email</label><input id="e_email" type="email" placeholder="editor@email.com"></div>
        <div class="field"><label>Password</label><input id="e_pass" type="password" placeholder="At least 6 characters"></div>
        <button class="btn gold" id="addEditor">Add editor</button></div></div>`;
  document.getElementById("addEditor").onclick=async()=>{
    const name=val("e_name"),email=val("e_email").toLowerCase(),pass=val("e_pass");
    if(!name){toast("Enter a name");return;}
    if(!emailOk(email)){toast("Enter a valid email");return;}
    if(pass.length<6){toast("Password must be 6+ characters");return;}
    if(email===CONFIG.admin.email.toLowerCase()||db.staff.some(s=>s.email.toLowerCase()===email)||db.users.some(u=>u.email.toLowerCase()===email)){toast("That email is already in use");return;}
    try{const ed={id:uid(),name,email,password:await hashPw(pass),role:"editor"};await saveStaff(ed);db.staff.push(ed);toast("Editor added");renderAdmin();}
    catch(e){console.error(e);toast("Couldn't add editor — try again");}};
  el.querySelectorAll("[data-rms]").forEach(b=>b.onclick=async()=>{if(confirm("Remove this editor account?")){
    try{await deleteStaffRow(b.dataset.rms);db.staff=db.staff.filter(s=>s.id!==b.dataset.rms);toast("Editor removed");renderAdmin();}
    catch(e){console.error(e);toast("Remove failed — try again");}}});
}

/* ---- utils ---- */
function escapeHtml(s){return (s||"").replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escapeAttr(s){return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
let tt;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),2600);}
document.querySelectorAll("[data-nav]").forEach(n=>n.onclick=()=>go(n.dataset.nav));

/* ---- boot ---- */
async function boot(){
  app.innerHTML=`<div class="loader"><div class="script">Klyro</div><div class="spin"></div><div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase">Loading the boutique…</div></div>`;
  sesLoad();
  try{ await loadAll(); }
  catch(e){
    app.innerHTML=`<div class="wrap" style="padding-top:60px"><div class="empty"><div class="script">Connection issue</div>
      <p>Couldn't reach the database. If you just set things up, make sure the Supabase tables and access policies were created, then refresh.</p></div></div>`;
    renderAcct(); return;
  }
  updateCartCount();renderAcct();go("store");
}
boot();
</script>
